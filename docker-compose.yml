# Atlas + Prometheus + Grafana (+ optional Alertmanager) stack.
#
# Usage:
#   1. cp secrets/atlas_password.example secrets/atlas_password
#      and edit it with your Atlas Prometheus password.
#   2. Edit prometheus.yml (or prometheus-atlas.yml) and replace the
#      Atlas username and group ID placeholders.
#   3. cp .env.example .env and adjust Grafana admin credentials.
#   4. docker compose up -d                       # Prometheus + Grafana
#      docker compose --profile alerting up -d    # also start Alertmanager

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      # Default: minimal config. To use the advanced config instead, comment
      # the first line and uncomment the prometheus-atlas.yml line below.
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # - ./prometheus-atlas.yml:/etc/prometheus/prometheus.yml:ro
      - ./atlas_recording_rules.yml:/etc/prometheus/rules/atlas_recording_rules.yml:ro
      - ./atlas_alerting_rules.yml:/etc/prometheus/rules/atlas_alerting_rules.yml:ro
      - ./secrets:/etc/prometheus/secrets:ro
      - prometheus_data:/prometheus

  grafana:
    image: grafana/grafana-enterprise:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    profiles: ["alerting"]
    ports:
      - "9093:9093"
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
