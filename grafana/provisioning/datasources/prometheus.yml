# Grafana datasource provisioning.
# Loaded automatically on Grafana startup from
# /etc/grafana/provisioning/datasources/.
# Docs: https://grafana.com/docs/grafana/latest/administration/provisioning/#data-sources

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      httpMethod: POST
      timeInterval: 60s
