# =============================================================================
# Prometheus Configuration for MongoDB Atlas
# Based on Atlas Prometheus Integration best practices
# Requires: Atlas M10+ cluster with Prometheus integration enabled
# =============================================================================

global:
  scrape_interval: 60s         # Atlas metrics update every 60s; scraping faster wastes bandwidth
  evaluation_interval: 60s     # Align rule evaluation with scrape cadence
  scrape_timeout: 30s

  # Applied to all time series -- useful for multi-cluster or multi-team setups
  external_labels:
    monitor: "atlas-prometheus"
    org: "your-org-name"       # Replace with your organization name

# =============================================================================
# Alertmanager Integration
# =============================================================================
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# =============================================================================
# Recording and Alerting Rules
# =============================================================================
rule_files:
  - "rules/atlas_recording_rules.yml"
  - "rules/atlas_alerting_rules.yml"

# =============================================================================
# Scrape Configurations
# =============================================================================
scrape_configs:

  # ---------------------------------------------------------------------------
  # MongoDB Atlas Federation Endpoint -- Production Clusters
  # ---------------------------------------------------------------------------
  - job_name: "mongodb_atlas_production"

    scheme: https
    metrics_path: /metrics

    basic_auth:
      username: "REPLACE_WITH_ATLAS_USERNAME"
      password_file: /etc/prometheus/secrets/atlas_password

    http_sd_configs:
      - url: https://cloud.mongodb.com/prometheus/v1.0/groups/REPLACE_WITH_PROD_ATLAS_GROUP_ID/discovery
        refresh_interval: 2m
        basic_auth:
          username: "REPLACE_WITH_ATLAS_USERNAME"
          password_file: /etc/prometheus/secrets/atlas_password

    # --- Target Relabeling (before scrape) ---
    # Enrich all metrics with team and region context at scrape time
    relabel_configs:
      - target_label: team
        replacement: "platform-engineering"                 # Replace with your team

      - target_label: region
        replacement: "us-east-1"                           # Replace with your Atlas region

      - source_labels: [__address__]
        target_label: hostname

      - target_label: environment
        replacement: "production"

      - target_label: cloud_provider
        replacement: "atlas"

      - target_label: cluster_tier
        replacement: "M20"                                 # Replace with your tier

    # --- Metric Relabeling (after scrape, before storage) ---
    metric_relabel_configs:

      # -- DROP: Go runtime and process metrics exposed by the Atlas agent
      - source_labels: [__name__]
        regex: "go_.*|promhttp_.*|process_.*"
        action: drop

      # -- KEEP: Atlas/MongoDB metrics backing the top-20 recording and alerting
      # rules. This intentionally keeps all mongodb_* series so the config works
      # across Atlas metric-name revisions and customer-specific metric surfaces.
      - source_labels: [__name__]
        regex: "mongodb_.*|atlas_.*|hardware_.*|QUERY_TARGETING_.*"
        action: keep

      # -- LABELDROP: Remove process_port to avoid unnecessary cardinality
      # Only drop if you don't need port-level granularity across replica set members
      - regex: "process_port"
        action: labeldrop

      # -- LABELDROP: Remove raw node IDs if you only care about cluster-level aggregation
      # Comment out if you need per-node debugging capability
      # - regex: "node_id"
      #   action: labeldrop

  # ---------------------------------------------------------------------------
  # MongoDB Atlas Federation Endpoint -- Staging Clusters (leaner config)
  # ---------------------------------------------------------------------------
  - job_name: "mongodb_atlas_staging"

    scheme: https
    metrics_path: /metrics

    basic_auth:
      username: "REPLACE_WITH_ATLAS_USERNAME"
      password_file: /etc/prometheus/secrets/atlas_password

    http_sd_configs:
      - url: https://cloud.mongodb.com/prometheus/v1.0/groups/REPLACE_WITH_STAGING_ATLAS_GROUP_ID/discovery
        refresh_interval: 2m
        basic_auth:
          username: "REPLACE_WITH_ATLAS_USERNAME"
          password_file: /etc/prometheus/secrets/atlas_password

    relabel_configs:
      - target_label: team
        replacement: "platform-engineering"
      - target_label: region
        replacement: "us-east-1"
      - source_labels: [__address__]
        target_label: hostname
      - target_label: environment
        replacement: "staging"
      - target_label: cloud_provider
        replacement: "atlas"
      - target_label: cluster_tier
        replacement: "M10"

    metric_relabel_configs:
      # Staging: keep the same top-20 inputs so dashboards and alerts work in
      # pre-production. Tighten this only after confirming which rules you use.
      - source_labels: [__name__]
        regex: "go_.*|promhttp_.*|process_.*"
        action: drop

      - source_labels: [__name__]
        regex: "mongodb_.*|atlas_.*|hardware_.*|QUERY_TARGETING_.*"
        action: keep

      - regex: "process_port"
        action: labeldrop
