global:
  scrape_interval: 30s # <-- DEFAULT: All jobs scrape every 30 seconds
  scrape_timeout: 30s
  evaluation_interval: 1m
rule_files:
  - "rules/atlas_recording_rules.yml"
  - "rules/atlas_alerting_rules.yml"
scrape_configs:
# Recommended intervals  
- job_name: "AlejandroMR-mongo-metrics"
  scrape_interval: 60s   # Don't go below 60s for Atlas 
  scrape_timeout: 30s    # Allow sufficient timeout 
  metrics_path: /metrics
  relabel_configs:
    - source_labels: [__address__]
      target_label: hostname
  metric_relabel_configs:

    # -- DROP: Go runtime and process metrics exposed by the Atlas agent
    - source_labels: [__name__]
      regex: "go_.*|promhttp_.*|process_.*"
      action: drop

    # -- KEEP: Atlas/MongoDB metrics backing the top-20 recording and alerting
    # rules. This intentionally keeps all mongodb_* series so the config works
    # across Atlas metric-name revisions and customer-specific metric surfaces.
    - source_labels: [__name__]
      regex: "mongodb_.*|atlas_.*|hardware_.*|QUERY_TARGETING_.*"
      action: keep
  scheme : https
  basic_auth:
    username: REPLACE_WITH_ATLAS_USERNAME
    password_file: /etc/prometheus/secrets/atlas_password
  http_sd_configs:
    - url: https://cloud.mongodb.com/prometheus/v1.0/groups/REPLACE_WITH_ATLAS_GROUP_ID/discovery
      refresh_interval: 2m
      basic_auth:
        username: REPLACE_WITH_ATLAS_USERNAME
        password_file: /etc/prometheus/secrets/atlas_password
