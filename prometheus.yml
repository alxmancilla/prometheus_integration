global:
  scrape_interval: 30s # <-- DEFAULT: All jobs scrape every 30 seconds
  scrape_timeout: 30s
  evaluation_interval: 1m
rule_files:
  - "alert.rules.yml"
scrape_configs:
# Recommended intervals  
- job_name: "AlejandroMR-mongo-metrics"
  scrape_interval: 60s   # Don't go below 60s for Atlas 
  scrape_timeout: 30s    # Allow sufficient timeout 
  metrics_path: /metrics
  metric_relabel_configs:

    # -- DROP: high-volume WiredTiger internals (pages, evictions, sessions).
    # Cache byte/dirty metrics are kept below via the whitelist.
    - source_labels: [__name__]
      regex: "mongodb_ss_wt_cache_(pages_.*|eviction_.*|internal_.*|leaf_.*|read_into_cache|written_from_cache)"
      action: drop

    # -- DROP: low-level WiredTiger transaction and concurrency ticket internals
    - source_labels: [__name__]
      regex: "mongodb_ss_wt_(txn|concurrentTransactions|session|log|reconciliation)_.*"
      action: drop

    # -- DROP: Go runtime and process metrics exposed by the Atlas agent
    - source_labels: [__name__]
      regex: "go_.*|process_.*"
      action: drop

    # -- KEEP: metrics backing the recording and alerting rules.
    # Host-level CPU/disk (mongodb_sys_*) is exposed via the Atlas Admin API
    # measurements endpoint, not the Prometheus federation surface, so it is
    # not listed here. Comment this block out to retain all remaining metrics.
    - source_labels: [__name__]
      regex: |
        mongodb_up|
        mongodb_ss_opcounters.*|
        mongodb_ss_connections.*|
        mongodb_ss_mem.*|
        mongodb_ss_globalLock.*|
        mongodb_ss_repl.*|
        mongodb_ss_wt_cache_bytes.*|
        mongodb_ss_wt_cache_tracked_dirty_bytes_in_the_cache|
        mongodb_mongod_op_latencies.*|
        mongodb_mongod_locks.*|
        mongodb_mongod_repl_lag
      action: keep
  scheme : https
  basic_auth:
    username: REPLACE_WITH_ATLAS_USERNAME
    password_file: /etc/prometheus/secrets/atlas_password
  http_sd_configs:
    - url: https://cloud.mongodb.com/prometheus/v1.0/groups/REPLACE_WITH_ATLAS_GROUP_ID/discovery
      refresh_interval: 2m
      basic_auth:
        username: REPLACE_WITH_ATLAS_USERNAME
        password_file: /etc/prometheus/secrets/atlas_password
